name: Automated Release

#this autmoation is creating release uppon pushing changes to main branch
#To have proper number of version it is important to use correct labels in pull request

#naming: Version x.y.z
            #x - major
            #y - minor
            #z - patch
#Labels on pull request should be named as: 'major', 'minor', or 'patch' to execute action properly
#If label will not be found, action will fail the test !!

on:
  pull_request:
    branches:
      - main  # Trigger only when code is merged into main
    types: [closed]

permissions:
  contents: write  # Allows the robot to create tags and releases

jobs:
  build-and-release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetches all history so it can find the previous version tag

# 1. This step identifies which label is present (major, minor, or patch)
      - id: bump
        uses: zwaldowski/match-label-action@v4
        with:
          allowed: major,minor,patch
          # This provides a default if no label is found, preventing the 'null' crash
          default_match: patch 

      # 2. This step uses the output from above to determine the new version
      - name: Determine Version Bump
        id: next_version
        uses: zwaldowski/semver-release-action@v3
        with:
          bump: ${{ steps.bump.outputs.match }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # 3. This step actually creates the release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.next_version.outputs.version }}
          name: Release ${{ steps.next_version.outputs.version }}
          generate_release_notes: true